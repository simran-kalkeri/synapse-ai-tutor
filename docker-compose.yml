services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  # Runs standalone with JSON file storage.
  # For PostgreSQL + Redis, use: docker-compose -f docker-compose.yml -f docker-compose.pg.yml up
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: synapse-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-to-a-random-64-char-string-for-production}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - ELEVENLABS_ENABLED=${ELEVENLABS_ENABLED:-false}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - APP_ENV=production
      - LOG_LEVEL=INFO
    volumes:
      # Persist all JSON data files (progress, memory, notes, etc.)
      - ./synapse_ai_tutor/data:/app/synapse_ai_tutor/data
      - synapse_audio_cache:/app/audio_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy (production only — enable with --profile production) ─
  nginx:
    image: nginx:alpine
    container_name: synapse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    profiles:
      - production

volumes:
  synapse_audio_cache:
    driver: local
